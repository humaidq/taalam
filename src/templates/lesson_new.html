{{ template "head" . }}

{{ if .Error }}
<div class="alert alert-red">
  <h5 class="alert-title">Error</h5>
  <p>{{ .Error }}</p>
</div>
{{ end }}

<div class="page-header">
  <h2>New lesson</h2>
  <div class="page-header-actions">
    <a href="/courses/{{ .Course.ID }}" class="btn">{{ .Course.Code }}</a>
    <a href="/courses" class="btn">Courses</a>
  </div>
</div>

<div class="section-card">
  <h3>Create lesson in {{ .Unit.Title }}</h3>
  <form method="POST" action="/courses/{{ .Course.ID }}/units/{{ .Unit.ID }}/lessons" class="auth-form-stack">
    <input type="hidden" name="_csrf" value="{{ .csrf_token }}" />
    <div class="form-group">
      <label for="lesson-title" class="item-title">Lesson title</label>
      <input type="text" id="lesson-title" name="title" class="form-item" placeholder="Lesson title" required />
    </div>
    <div class="form-group">
      <label for="lesson-description" class="item-title">Description</label>
      <textarea id="lesson-description" name="description" class="form-item" rows="4" placeholder="What this lesson covers."></textarea>
    </div>
    <div class="form-group">
      <button type="submit" class="btn">Create lesson</button>
    </div>
  </form>
</div>

{{ template "foot" . }}
