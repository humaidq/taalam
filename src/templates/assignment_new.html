{{ template "head" . }}

{{ if .Error }}
<div class="alert alert-red">
  <h5 class="alert-title">Error</h5>
  <p>{{ .Error }}</p>
</div>
{{ end }}

<div class="page-header">
  <h2>New assignment</h2>
  <div class="page-header-actions">
    <a href="/courses/{{ .Course.ID }}" class="btn">{{ .Course.Code }}</a>
    <a href="/courses" class="btn">Courses</a>
  </div>
</div>

<div class="section-card">
  <h3>Publish assignment in {{ .Course.Code }} - {{ .Course.Title }}</h3>
  <form method="POST" action="/courses/{{ .Course.ID }}/assignments" class="auth-form-stack">
    <input type="hidden" name="_csrf" value="{{ .csrf_token }}" />
    <div class="form-group">
      <label for="assignment-title" class="item-title">Title</label>
      <input type="text" id="assignment-title" name="title" class="form-item" placeholder="Assignment 1" required />
    </div>
    <div class="form-group">
      <label for="assignment-description" class="item-title">Description</label>
      <textarea id="assignment-description" name="description" class="form-item" rows="5" placeholder="Describe the task, submission expectations, and rubric notes."></textarea>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label for="assignment-due-at" class="item-title">Due date (optional)</label>
        <input type="datetime-local" id="assignment-due-at" name="due_at" class="form-item" />
      </div>
      <div class="form-group">
        <label for="assignment-max-grade" class="item-title">Maximum grade</label>
        <input type="number" id="assignment-max-grade" name="max_grade" class="form-item" min="0" step="0.01" value="100" required />
      </div>
    </div>
    <div class="form-group">
      <label for="assignment-insert-after" class="item-title">Insert in course content</label>
      <select id="assignment-insert-after" name="insert_after_item_id" class="form-item">
        <option value="">At the end of the course content</option>
        {{ range .OutlineInsertOptions }}
        <option value="{{ .ID }}">{{ .Label }}</option>
        {{ end }}
      </select>
    </div>
    <div class="form-group">
      <button type="submit" class="btn">Publish assignment</button>
    </div>
  </form>
</div>

{{ template "foot" . }}
